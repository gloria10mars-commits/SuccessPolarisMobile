name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 📦 Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📥 Install dependencies
        run: npm install --legacy-peer-deps

      - name: 🔍 Type check
        run: npx tsc --noEmit || true

      - name: ⚙️ Set up Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          packager: npm

      - name: 🏗️ Prebuild native Android project
        run: npx expo prebuild --platform android --clean

      - name: 🩹 Patch Kotlin compatibility (suppress Compose Compiler version check)
        run: python3 scripts/patch_gradle.py

      - name: 🔑 Generate debug keystore (no signing key needed for preview APK)
        run: |
          if [ ! -f android/app/debug.keystore ]; then
            keytool -genkeypair -v -storetype PKCS12 \
              -keystore android/app/debug.keystore \
              -alias androiddebugkey \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: 🛠️ Build APK with Gradle
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon -x lintVitalAnalyzeRelease

      - name: 📤 Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SuccessPolaris-APK
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30
          if-no-files-found: error

      - name: 📊 Summary
        run: |
          echo "### ✅ Build APK terminé" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Téléchargez l'APK depuis l'onglet **Artifacts** du run." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Run ID**: ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
